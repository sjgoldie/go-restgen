version: 2

linters-settings:
  dupl:
    threshold: 100
  goconst:
    min-len: 2
    min-occurrences: 2
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
  gocyclo:
    min-complexity: 15
  goimports:
    local-prefixes: github.com/sjgoldie/go-restgen
  golint:
    min-confidence: 0
  govet:
    check-shadowing: true
  maligned:
    suggest-new: true
  misspell:
    locale: US

linters:
  disable-all: true
  enable:
    - bodyclose
    - dupl
    - errcheck
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    # - lll  # Disabled - line length limits are too restrictive
    - misspell
    - nakedret
    - staticcheck  # Includes gosimple and stylecheck in newer versions
    - unconvert
    - unparam
    - unused
    - whitespace

issues:
  exclude-rules:
    # Only exclude govet shadow checking in tests (err variable reuse is common pattern)
    - path: _test\.go
      linters:
        - govet
      text: "shadow"

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
  skip-files:
    - ".*\\.pb\\.go$"

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
