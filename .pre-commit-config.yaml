# Install pre-commit hooks with: pre-commit install
# Run manually with: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: 'restgen-gopher\.png'
      - id: check-merge-conflict
      - id: check-case-conflict

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: gofmt -w -s
        language: system
        files: \.go$
        pass_filenames: true

      - id: go-imports
        name: go imports
        entry: bash -c '$(go env GOPATH)/bin/goimports -w -local github.com/sjgoldie/go-restgen "$@"' --
        language: system
        files: \.go$
        pass_filenames: true

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        files: \.go$
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        entry: bash -c '$(go env GOPATH)/bin/golangci-lint run --fix'
        language: system
        files: \.go$
        pass_filenames: false

      - id: go-test
        name: go test (core packages)
        entry: bash -c 'go test ./metadata ./datastore ./router ./service ./handler ./errors ./filestore'
        language: system
        files: \.go$
        pass_filenames: false

      - id: go-mod-tidy
        name: go mod tidy
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum'
        language: system
        files: go\.(mod|sum)$
        pass_filenames: false

      - id: go-licence-detector
        name: go licence detector
        entry: bash -c 'export PATH="$HOME/go/bin:$(go env GOPATH)/bin:$PATH" && go list -m -json all | go-licence-detector -rules=scripts/licence-rules.json -noticeTemplate=scripts/templates/NOTICE.txt.tmpl -noticeOut=THIRD_PARTY_NOTICES -includeIndirect && git add THIRD_PARTY_NOTICES'
        language: system
        files: go\.(mod|sum)$
        pass_filenames: false
